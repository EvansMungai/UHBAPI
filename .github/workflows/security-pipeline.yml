name: Secure CI Pipeline (SAST & SCA)

on: 
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 1'
  
permissions:
  contents: read
  security-events: write

jobs:
  sonar-scan:
    name: Run SonarQube Cloud Analysis
    runs-on: ubuntu-latest


    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0'

      - name: Install SonarScanner Tool
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Build and Analyze
        env:
          PROJECT_KEY: ${{ secrets.PROJECT_KEY }}
          ORGANIZATION_KEY: ${{ secrets.ORGANIZATION_KEY }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} 

        run: |
          dotnet-sonarscanner begin \
            /k:"$PROJECT_KEY" \
            /o:"$ORGANIZATION_KEY" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.qualitygate.wait=true

          dotnet build UHB.sln --configuration Release

          dotnet-sonarscanner end /d:sonar.token="$SONAR_TOKEN"

  trivy-sca: 
    name: Trivy Dependency & Image Scan
    needs: sonar-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Scan Repository files
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'HIGH,CRITICAL'

      - name: Upload FS Scan Results to GitHub
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-fs-results.sarif'
          category: 'trivy-fs'

      - name: Generate CycloneDX SBOM
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with: 
          scan-type: 'fs'
          scan-ref: '.'
          format: 'cyclonedx'
          output: 'sbom.json'

      - name: Save SBOM as Pipeline Artifact
        uses: actions/upload-artifact@v4
        with: 
          name: application-sbom
          path: sbom.json

      - name: Build Local Docker image
        run: | 
          docker build -t uhbapi:${{ github.sha }} -f UHB/Dockerfile .

      - name: Scan the build image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with: 
          scan-type: 'image'
          image-ref: 'uhbapi:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          severity: 'HIGH,CRITICAL'

      - name: Upload Image Scan Results to GitHub
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-image-results.sarif'
          category: 'trivy-image'

      - name: Fail pipeline if vulnerabilites exist
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: 'image'
          image-ref: 'uhbapi:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'